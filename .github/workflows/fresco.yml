# Generate a new Fresco banner image on each release.
# Updates latest.jpg on R2 immediately, then opens a PR for the gallery.

name: Fresco

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fresco
        run: brew install argylebits/tap/fresco

      - name: Generate image
        id: fresco
        run: echo "url=$(fresco generate)" >> "$GITHUB_OUTPUT"
        env:
          FRESCO_PROMPT:         ${{ secrets.FRESCO_PROMPT }}
          FRESCO_SLUG:           ${{ secrets.FRESCO_SLUG }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:    ${{ secrets.R2_PUBLIC_BASE_URL }}

      - name: Copy to latest.jpg
        run: |
          curl -sfo /tmp/latest.jpg "${{ steps.fresco.outputs.url }}"
          aws s3 cp /tmp/latest.jpg \
            "s3://${R2_BUCKET}/${FRESCO_SLUG}/latest.jpg" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type "image/jpeg"
        env:
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          FRESCO_SLUG:           ${{ secrets.FRESCO_SLUG }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Purge GitHub camo cache
        if: vars.CAMO_IMAGE_URL != ''
        run: curl -sX PURGE "${{ vars.CAMO_IMAGE_URL }}"

      - name: Append gallery entry
        run: |
          URL="${{ steps.fresco.outputs.url }}"
          TAG="${{ github.event.release.tag_name }}"
          echo "| ${TAG} | ![]($URL) |" >> gallery.md

      - name: Open PR with gallery update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gallery.md
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          TAG="${{ github.event.release.tag_name }}"
          BRANCH="fresco/${TAG}"
          git checkout -b "$BRANCH"
          git commit -m "fresco: ${TAG}"
          git push origin "$BRANCH"
          gh pr create \
            --title "fresco: ${TAG}" \
            --body "Automated gallery update for ${TAG}." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
