name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build FrescoCore
        run: swift build
        working-directory: FrescoCore

      - name: Test FrescoCore
        run: swift test
        working-directory: FrescoCore

      - name: Build FrescoCLI
        run: swift build
        working-directory: FrescoCLI

      - name: Test FrescoCLI
        run: swift test
        working-directory: FrescoCLI

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2

      - name: Build FrescoCore
        run: swift build
        working-directory: FrescoCore

      - name: Test FrescoCore
        run: swift test
        working-directory: FrescoCore

      - name: Build FrescoCLI
        run: swift build
        working-directory: FrescoCLI

      - name: Test FrescoCLI
        run: swift test
        working-directory: FrescoCLI
