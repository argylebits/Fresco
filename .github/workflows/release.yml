name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and package binary
        run: |
          swift build -c release --package-path FrescoCLI --arch ${{ matrix.arch }}
          BIN_PATH=$(swift build -c release --package-path FrescoCLI --arch ${{ matrix.arch }} --show-bin-path)
          mkdir -p staging
          cp "$BIN_PATH/FrescoCLI" staging/fresco
          chmod +x staging/fresco
          tar czf fresco-macos-${{ matrix.arch }}.tar.gz -C staging fresco

      - uses: actions/upload-artifact@v4
        with:
          name: fresco-macos-${{ matrix.arch }}
          path: fresco-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:6.2
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and package binary
        run: |
          swift build -c release --package-path FrescoCLI
          BIN_PATH=$(swift build -c release --package-path FrescoCLI --show-bin-path)
          mkdir -p staging
          cp "$BIN_PATH/FrescoCLI" staging/fresco
          chmod +x staging/fresco
          tar czf fresco-linux-${{ matrix.arch }}.tar.gz -C staging fresco

      - uses: actions/upload-artifact@v4
        with:
          name: fresco-linux-${{ matrix.arch }}
          path: fresco-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets with --clobber"
            gh release upload "$TAG" --clobber -- artifacts/*.tar.gz
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              -- artifacts/*.tar.gz
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_MACOS_ARM64=$(shasum -a 256 artifacts/fresco-macos-arm64.tar.gz | awk '{print $1}')
          SHA_MACOS_X86=$(shasum -a 256 artifacts/fresco-macos-x86_64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 artifacts/fresco-linux-arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(shasum -a 256 artifacts/fresco-linux-x86_64.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<RUBY
          class Fresco < Formula
            desc "AI image generation CLI"
            homepage "https://github.com/argylebits/Fresco"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/argylebits/Fresco/releases/download/v#{version}/fresco-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              elsif Hardware::CPU.intel?
                url "https://github.com/argylebits/Fresco/releases/download/v#{version}/fresco-macos-x86_64.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/argylebits/Fresco/releases/download/v#{version}/fresco-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              elsif Hardware::CPU.intel?
                url "https://github.com/argylebits/Fresco/releases/download/v#{version}/fresco-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "fresco"
            end

            test do
              assert_match "fresco", shell_output("#{bin}/fresco --help")
            end
          end
          RUBY
          )

          EXISTING=$(gh api repos/argylebits/homebrew-tap/contents/Formula/fresco.rb --jq '.sha')

          gh api -X PUT repos/argylebits/homebrew-tap/contents/Formula/fresco.rb \
            -f message="Update fresco formula to ${VERSION}" \
            -f content="$(printf '%s\n' "$FORMULA" | base64 -w0)" \
            -f sha="$EXISTING"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
