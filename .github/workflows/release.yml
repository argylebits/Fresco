name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build and package binary
        run: |
          BIN_PATH=$(swift build -c release --package-path FrescoCLI --arch ${{ matrix.arch }} --show-bin-path)
          mkdir -p staging
          cp "$BIN_PATH/FrescoCLI" staging/fresco
          chmod +x staging/fresco
          tar czf fresco-macos-${{ matrix.arch }}.tar.gz -C staging fresco

      - uses: actions/upload-artifact@v4
        with:
          name: fresco-macos-${{ matrix.arch }}
          path: fresco-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:6.2
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build and package binary
        run: |
          BIN_PATH=$(swift build -c release --package-path FrescoCLI --show-bin-path)
          mkdir -p staging
          cp "$BIN_PATH/FrescoCLI" staging/fresco
          chmod +x staging/fresco
          tar czf fresco-linux-${{ matrix.arch }}.tar.gz -C staging fresco

      - uses: actions/upload-artifact@v4
        with:
          name: fresco-linux-${{ matrix.arch }}
          path: fresco-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_MACOS_ARM64=$(shasum -a 256 artifacts/fresco-macos-arm64.tar.gz | awk '{print $1}')
          SHA_MACOS_X86=$(shasum -a 256 artifacts/fresco-macos-x86_64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 artifacts/fresco-linux-arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(shasum -a 256 artifacts/fresco-linux-x86_64.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<'RUBY'
class Fresco < Formula
  desc "AI image generation CLI"
  homepage "https://github.com/argylebits/Fresco"
  version "VERSION_PLACEHOLDER"
  license "Apache-2.0"

  on_macos do
    if Hardware::CPU.arm?
      url "https://github.com/argylebits/Fresco/releases/download/vVERSION_PLACEHOLDER/fresco-macos-arm64.tar.gz"
      sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
    elsif Hardware::CPU.intel?
      url "https://github.com/argylebits/Fresco/releases/download/vVERSION_PLACEHOLDER/fresco-macos-x86_64.tar.gz"
      sha256 "SHA_MACOS_X86_PLACEHOLDER"
    end
  end

  on_linux do
    if Hardware::CPU.arm?
      url "https://github.com/argylebits/Fresco/releases/download/vVERSION_PLACEHOLDER/fresco-linux-arm64.tar.gz"
      sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
    elsif Hardware::CPU.intel?
      url "https://github.com/argylebits/Fresco/releases/download/vVERSION_PLACEHOLDER/fresco-linux-x86_64.tar.gz"
      sha256 "SHA_LINUX_X86_PLACEHOLDER"
    end
  end

  def install
    bin.install "fresco"
  end

  test do
    assert_match "fresco", shell_output("#{bin}/fresco --help")
  end
end
RUBY
          )

          FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
          FORMULA="${FORMULA//SHA_MACOS_ARM64_PLACEHOLDER/$SHA_MACOS_ARM64}"
          FORMULA="${FORMULA//SHA_MACOS_X86_PLACEHOLDER/$SHA_MACOS_X86}"
          FORMULA="${FORMULA//SHA_LINUX_ARM64_PLACEHOLDER/$SHA_LINUX_ARM64}"
          FORMULA="${FORMULA//SHA_LINUX_X86_PLACEHOLDER/$SHA_LINUX_X86}"

          EXISTING=$(gh api repos/argylebits/homebrew-tap/contents/Formula/fresco.rb --jq '.sha')

          gh api -X PUT repos/argylebits/homebrew-tap/contents/Formula/fresco.rb \
            -f message="Update fresco formula to ${VERSION}" \
            -f content="$(printf '%s' "$FORMULA" | base64 -w0)" \
            -f sha="$EXISTING"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
