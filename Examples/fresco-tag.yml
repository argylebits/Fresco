# Generate a Fresco image when a version tag is pushed.
# Workflow: push a tag like v1.0.0-rc → image generates → merge the image PR → cut the release from main.

name: Fresco (Tag)

on:
  push:
    tags:
      - 'v*'

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fresco
        run: brew install argylebits/tap/fresco

      - name: Generate image
        run: fresco generate
        env:
          FRESCO_PROMPT:         ${{ secrets.FRESCO_PROMPT }}
          FRESCO_SLUG:           ${{ secrets.FRESCO_SLUG }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:    ${{ secrets.R2_PUBLIC_BASE_URL }}
