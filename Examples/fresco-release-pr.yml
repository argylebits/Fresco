# Generate a Fresco image when a PR is labeled "release".
# Combine with step snippets to open a PR, update README, etc.

name: Fresco (Release PR)

on:
  pull_request:
    types: [labeled]

jobs:
  generate:
    if: github.event.label.name == 'release'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install Fresco
        run: brew install argylebits/tap/fresco

      - name: Generate image
        run: fresco generate
        env:
          FRESCO_PROMPT:         ${{ secrets.FRESCO_PROMPT }}
          FRESCO_SLUG:           ${{ secrets.FRESCO_SLUG }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:    ${{ secrets.R2_PUBLIC_BASE_URL }}
