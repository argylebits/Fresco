# Generate and upload a Fresco image on demand from the GitHub Actions UI.
# Optionally override the prompt at trigger time.

name: Fresco (Manual)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Override the default prompt'
        required: false

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fresco
        run: brew install argylebits/tap/fresco

      - name: Generate and upload
        run: |
          if [ -n "${{ github.event.inputs.prompt }}" ]; then
            fresco upload $(fresco generate --prompt "${{ github.event.inputs.prompt }}")
          else
            fresco upload $(fresco generate)
          fi
        env:
          FRESCO_PROMPT:         ${{ secrets.FRESCO_PROMPT }}
          FRESCO_SLUG:           ${{ secrets.FRESCO_SLUG }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL:    ${{ secrets.R2_PUBLIC_BASE_URL }}
